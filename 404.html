<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #eeeeee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            margin: 0;
            color: #ff4757;
            text-shadow: 4px 4px 0px #333;
        }
        .message {
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }
        .box {
            border: 2px dashed #444;
            padding: 20px 40px;
            border-radius: 8px;
        }
        .auth {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        a {
            color: #ff4757;
            text-decoration: none;
            border: 1px solid #ff4757;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }
        a:hover {
            background-color: #ff4757;
            color: white;
        }
    </style>
</head>
<body>
    <div class="box">
        <p class="error-code">404</p>
        <p class="message">Oops! The page you're looking for doesn't exist.</p>
        <a href="/">Back to Home</a>
    </div>
    <p class="auth">System Status: Authorized by Andi</p>
</body>
</html>
